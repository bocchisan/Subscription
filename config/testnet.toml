# Подписка — testnet profile.
#
# Ключи ровно по docs/game-spec.md §9:
#   threshold_key — имя threshold-ключа среды
#   per-chain: id, factory, domain
#
# factory / domain копируются из crown-factory/deploy/testnet.toml (форма
# stream); этот репозиторий их не порождает. Локальная реплика dfx и
# PocketIC дают то же имя ключа, что прод: key_1. Init-оверрайдов у этой
# канистры нет — она не зовёт никого, кроме management canister.

threshold_key = "key_1"

[[chain]]
id      = "solana-devnet"
factory = "57MpCQ3TfAE66qDAnfkP9AX7LRqwd4CNX8uN6DaVwm3V"
domain  = "crown:stream:solana-devnet"
# Прейскурант игры (factory-spec §2.1): поля рождения каждого её эскроу,
# часть соли. Комиссию снимает сам эскроу с каждого выпуска; отмена и
# возврат бесплатны.
fee_bps    = 300
fee_wallet = "3it64t7KXNip1C1BRYNh8ygeKyujWnaQrPSj3hV9TWbE"
